<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>The Smart Throne</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="app">
      <header class="top-bar">
        <div id="slide-type" class="chip">TEXT_QUOTE</div>
        <div id="weather-now" class="chip weather-chip">--°C</div>
        <div id="clock" class="clock">00:00</div>
      </header>

      <main id="slide-container" class="slide-container">
        <div id="image-layer" class="image-layer hidden" aria-hidden="true"></div>
        <div class="scrim"></div>
        <section class="text-layer">
          <h1 id="title" class="title"></h1>
          <p id="content" class="content"></p>
          <p id="sub-content" class="sub-content hidden"></p>
        </section>
      </main>

      <footer class="bottom-bar">
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </footer>

      <button id="admin-hotspot" class="admin-hotspot" aria-label="Admin Menü öffnen"></button>
      <aside id="admin-panel" class="admin-panel hidden" aria-hidden="true">
        <h2>Admin</h2>
        <p>Klick auf "Import", um Bilder nach Schema zu laden:</p>
        <p><code>TYPE_DURATION_REVEAL_TITLE.webp</code></p>
        <button id="import-button" type="button">Import</button>
        <button id="reset-button" type="button">Index zurücksetzen</button>
        <hr />
        <h3>Wetter</h3>
        <label class="field checkbox-field">
          <input id="weather-auto-location" type="checkbox" />
          <span>Ort automatisch bestimmen (Geolocation)</span>
        </label>
        <label class="field">
          <span>Ort (z. B. Berlin)</span>
          <input id="weather-location-input" type="text" placeholder="Berlin" />
        </label>
        <label class="field">
          <span>Wetter-Slide alle X Slides (0 = aus)</span>
          <input id="weather-insert-every" type="number" min="0" max="50" step="1" value="6" />
        </label>
        <button id="weather-save-button" type="button">Wetter speichern</button>
        <button id="weather-refresh-button" type="button">Wetter jetzt aktualisieren</button>
        <p id="weather-status" class="status-text">Wetter nicht konfiguriert.</p>
        <hr />
        <h3>News (heise Atom)</h3>
        <label class="field">
          <span>heise Feed</span>
          <select id="news-feed-select"></select>
        </label>
        <label class="field">
          <span>News-Slide alle X Slides (0 = aus)</span>
          <input id="news-insert-every" type="number" min="0" max="50" step="1" value="0" />
        </label>
        <button id="news-save-button" type="button">News speichern</button>
        <button id="news-refresh-button" type="button">News jetzt aktualisieren</button>
        <p id="news-status" class="status-text">News deaktiviert.</p>
        <button id="close-admin" type="button">Schließen</button>
        <input id="folder-input" class="hidden" type="file" accept="image/*" multiple />
      </aside>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
